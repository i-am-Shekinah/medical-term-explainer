name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        uses: huggingface/actions/space-sync@main
        with:
          space_id: ShekinahCodes/medical-term-explainer